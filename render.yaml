databases:
  - name: bam-postgres
    databaseName: bam_db
    user: bam_user
    plan: free           # passer en "starter" pour la production

services:
  # ── API FastAPI ──────────────────────────────────────────────────────────────
  # Le pipeline (main.py) est géré par Prefect — pas de cron job Render.
  - type: web
    name: bam-api
    runtime: python
    plan: free            # passer en "starter" pour la production
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bam-postgres
          property: connectionString
      - key: GEE_PROJECT
        sync: false       # à renseigner manuellement dans le dashboard Render
      - key: GEE_SERVICE_ACCOUNT_JSON
        sync: false       # contenu JSON du compte de service GEE (voir docs/gee_service_account.md)
      - key: NASA_USERNAME
        sync: false
      - key: NASA_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
